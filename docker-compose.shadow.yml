services:
  postgres:
    image: postgres:16-alpine
    container_name: daojie-local-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-mud}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jiuzhou123}
      POSTGRES_DB: ${DB_DATABASE:-daojie_yusheng}
    volumes:
      - pgdata_server:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-mud} -d ${DB_DATABASE:-daojie_yusheng}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: daojie-local-redis
    ports:
      - "${REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: ${SERVER_PORT:-3000}
      SERVER_DATABASE_URL: postgres://${DB_USERNAME:-mud}:${DB_PASSWORD:-jiuzhou123}@postgres:5432/${DB_DATABASE:-daojie_yusheng}
      DATABASE_URL: postgres://${DB_USERNAME:-mud}:${DB_PASSWORD:-jiuzhou123}@postgres:5432/${DB_DATABASE:-daojie_yusheng}
      SERVER_PLAYER_TOKEN_SECRET: ${SERVER_PLAYER_TOKEN_SECRET:-${JWT_SECRET:-}}
      SERVER_GM_PASSWORD: ${SERVER_GM_PASSWORD:-${GM_PASSWORD:-}}
      GM_PASSWORD: ${GM_PASSWORD:-${SERVER_GM_PASSWORD:-}}
      SERVER_RUNTIME_TOKEN: ${SERVER_RUNTIME_TOKEN}
      SERVER_ALLOW_LEGACY_HTTP_COMPAT: ${SERVER_ALLOW_LEGACY_HTTP_COMPAT:-0}
      SERVER_GM_DATABASE_BACKUP_DIR: /var/lib/server/gm-database-backups
    ports:
      - "${SERVER_PORT:-3000}:${SERVER_PORT:-3000}"
    volumes:
      - server_backup_data:/var/lib/server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:${SERVER_PORT:-3000}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  pgdata_server:
  server_backup_data:
