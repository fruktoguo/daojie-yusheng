services:
  postgres:
    image: postgres:16-alpine
    container_name: mud-local-postgres-next
    environment:
      POSTGRES_USER: ${DB_USERNAME:-mud}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jiuzhou123}
      POSTGRES_DB: ${DB_DATABASE:-mud_mmo_next}
    volumes:
      - pgdata_server_next:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-mud} -d ${DB_DATABASE:-mud_mmo_next}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mud-local-redis-next
    ports:
      - "${REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server-next:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    environment:
      SERVER_NEXT_HOST: 0.0.0.0
      SERVER_NEXT_PORT: 13001
      SERVER_NEXT_DATABASE_URL: postgres://${DB_USERNAME:-mud}:${DB_PASSWORD:-jiuzhou123}@postgres:5432/${DB_DATABASE:-mud_mmo_next}
      DATABASE_URL: postgres://${DB_USERNAME:-mud}:${DB_PASSWORD:-jiuzhou123}@postgres:5432/${DB_DATABASE:-mud_mmo_next}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_NEXT_GM_PASSWORD: ${GM_PASSWORD:-admin123}
      GM_PASSWORD: ${GM_PASSWORD:-admin123}
      SERVER_NEXT_RUNTIME_TOKEN: ${SERVER_NEXT_RUNTIME_TOKEN}
      SERVER_NEXT_ALLOW_LEGACY_HTTP_COMPAT: ${SERVER_NEXT_ALLOW_LEGACY_HTTP_COMPAT:-1}
      SERVER_NEXT_GM_DATABASE_BACKUP_DIR: /var/lib/server-next/gm-database-backups
    ports:
      - "11922:13001"
    volumes:
      - server_next_backup_data:/var/lib/server-next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:13001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    environment:
      NGINX_WORKER_PROCESSES: ${NGINX_WORKER_PROCESSES:-auto}
    ports:
      - "11921:80"
    depends_on:
      server-next:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata_server_next:
  server_next_backup_data:
