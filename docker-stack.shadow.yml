services:
  server:
    image: ${SERVER_IMAGE_REPOSITORY:-ghcr.io/${GHCR_OWNER:-fruktoguo}/daojie-yusheng-server}:${SERVER_IMAGE_TAG:-shadow-latest}
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3000
      SERVER_DATABASE_URL: postgres://${DB_USERNAME:-mud}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE:-daojie_yusheng}
      DATABASE_URL: postgres://${DB_USERNAME:-mud}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE:-daojie_yusheng}
      SERVER_PLAYER_TOKEN_SECRET: ${SERVER_PLAYER_TOKEN_SECRET}
      SERVER_GM_PASSWORD: ${SERVER_GM_PASSWORD:-${GM_PASSWORD:-}}
      GM_PASSWORD: ${GM_PASSWORD:-${SERVER_GM_PASSWORD:-}}
      SERVER_RUNTIME_TOKEN: ${SERVER_RUNTIME_TOKEN}
      SERVER_GM_DATABASE_BACKUP_DIR: /var/lib/server/gm-database-backups
    ports:
      - target: 3000
        published: 11923
        protocol: tcp
        mode: ingress
    volumes:
      - server_backup_data:/var/lib/server
    networks:
      - daojie_net
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - |
          fetch('http://127.0.0.1:3000/health').then(async (response) => {
            const body = await response.json().catch(() => null);
            const ready = response.ok && body?.ok === true && body?.readiness?.ok === true;
            process.exit(ready ? 0 : 1);
          }).catch(() => process.exit(1));
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME:-mud}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-daojie_yusheng}
    volumes:
      - pgdata_server:/var/lib/postgresql/data
    networks:
      - daojie_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-mud} -d ${DB_DATABASE:-daojie_yusheng}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      update_config:
        order: stop-first

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata_server:/data
    networks:
      - daojie_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      update_config:
        order: stop-first

volumes:
  pgdata_server:
  redisdata_server:
  server_backup_data:

networks:
  daojie_net:
    driver: overlay
