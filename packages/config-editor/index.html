<!doctype html>
<html lang="zh-CN" data-theme-preset="default" data-theme-radius="md" data-theme-scale="md" data-theme-sidebar="inset" data-theme-content-layout="default">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>道劫余生 · 本地配置编辑器</title>
    <script>
      // 在 React 挂载之前先把保存的主题模式贴到 <html>，避免亮 → 暗闪烁。
      (function () {
        try {
          var raw = localStorage.getItem('config-editor.theme.v1');
          if (!raw) return;
          var saved = JSON.parse(raw);
          var html = document.documentElement;
          if (saved.preset) html.dataset.themePreset = saved.preset;
          if (saved.radius) html.dataset.themeRadius = saved.radius;
          if (saved.scale) html.dataset.themeScale = saved.scale;
          if (saved.sidebar) html.dataset.themeSidebar = saved.sidebar;
          if (saved.contentLayout) html.dataset.themeContentLayout = saved.contentLayout;
          var mode = saved.mode || 'system';
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = mode === 'dark' || (mode === 'system' && prefersDark);
          html.classList.toggle('dark', dark);
        } catch (_e) {
          /* ignore */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
