name: Verify Replace-Ready With DB

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-replace-ready-with-db:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: daojie_yusheng_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d daojie_yusheng_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/daojie_yusheng_ci?schema=public
      SERVER_GM_PASSWORD: ci-verify-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Doctor
        run: pnpm verify:replace-ready:doctor

      - name: Verify replace-ready with DB
        run: pnpm verify:replace-ready:with-db
