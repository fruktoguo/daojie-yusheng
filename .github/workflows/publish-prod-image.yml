name: Publish Prod Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  verify-baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Verify deploy baseline
        run: pnpm verify:deploy-baseline

  build-prod-images:
    runs-on: ubuntu-latest
    needs: verify-baseline
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: daojie-yusheng-server
            dockerfile: packages/server/Dockerfile
          - image_name: daojie-yusheng-client
            dockerfile: packages/client/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Normalize image owner
        id: prep
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image_name }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner }}/${{ matrix.image_name }}:prod
            ghcr.io/${{ steps.prep.outputs.owner }}/${{ matrix.image_name }}:prod-sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
