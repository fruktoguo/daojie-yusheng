name: Build And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  verify-baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Verify deploy baseline
        run: pnpm verify:deploy-baseline

  build-images:
    runs-on: ubuntu-latest
    needs: verify-baseline
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: daojie-yusheng-server
            dockerfile: packages/server/Dockerfile
          - image_name: daojie-yusheng-client
            dockerfile: packages/client/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Normalize image owner
        id: prep
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image_name }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner }}/${{ matrix.image_name }}:latest
            ghcr.io/${{ steps.prep.outputs.owner }}/${{ matrix.image_name }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-images
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Normalize image owner
        id: prep
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_SSH_PORT:-22}" "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Log in to GHCR for deploy
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Create remote Docker context
        env:
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          docker context rm production >/dev/null 2>&1 || true
          docker context create production --docker "host=ssh://${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}:${DEPLOY_SSH_PORT:-22}"

      - name: Verify replace-ready doctor
        run: pnpm verify:replace-ready:doctor

      - name: Deploy production stack
        env:
          CLIENT_IMAGE_TAG: sha-${{ github.sha }}
          SERVER_IMAGE_TAG: sha-${{ github.sha }}
          DB_USERNAME: ${{ secrets.PROD_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          DB_DATABASE: ${{ secrets.PROD_DB_DATABASE }}
          PLAYER_TOKEN_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          GM_PASSWORD: ${{ secrets.PROD_GM_PASSWORD }}
        run: |
          SERVER_PLAYER_TOKEN_SECRET="$PLAYER_TOKEN_SECRET" GM_PASSWORD="$GM_PASSWORD" docker --context production stack deploy --detach=false --with-registry-auth -c docker-stack.yml daojie-yusheng

      - name: Show production rollout state
        run: |
          set -euo pipefail
          docker --context production service ps daojie-yusheng_server --no-trunc
          docker --context production service ps daojie-yusheng_client --no-trunc

      - name: Verify deployed production routes
        env:
          GM_PASSWORD: ${{ secrets.PROD_GM_PASSWORD }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          set -euo pipefail
          docker --context production service logs --tail 120 daojie-yusheng_server || true
          docker --context production service logs --tail 80 daojie-yusheng_client || true

          quote_for_sh() {
            printf "'%s'" "$(printf '%s' "$1" | sed "s/'/'\\\\''/g")"
          }

          REMOTE="${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}"
          GM_PASSWORD_Q="$(quote_for_sh "$GM_PASSWORD")"
          ssh -p "${DEPLOY_SSH_PORT:-22}" -o BatchMode=yes -o ConnectTimeout=8 "$REMOTE" \
            "GM_PASSWORD=$GM_PASSWORD_Q timeout 60 sh -s" <<'REMOTE_PROBE'
          set -eu

          if ! command -v curl >/dev/null 2>&1; then
            echo "curl is required on the production host for route probes" >&2
            exit 127
          fi

          request_json_code() {
            name="$1"
            url="$2"
            data="$3"
            expected="$4"
            body="/tmp/${name}.out"
            code="$(curl --connect-timeout 3 --max-time 8 -sS -o "$body" -w "%{http_code}" \
              -H 'Content-Type: application/json' \
              -X POST "$url" \
              --data "$data")"
            if ! printf '%s\n' "$code" | grep -Eq "$expected"; then
              echo "route probe failed: $name url=$url status=$code expected=$expected" >&2
              sed -n '1,80p' "$body" >&2 || true
              exit 1
            fi
            echo "route probe ok: $name status=$code"
          }

          json_escape() {
            printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g'
          }

          curl --connect-timeout 3 --max-time 8 -fsS http://127.0.0.1:11922/health >/tmp/daojie-health.out
          echo "route probe ok: server-health"

          request_json_code player-login \
            http://127.0.0.1:11922/api/auth/login \
            '{"loginName":"__deploy_probe__","password":"__deploy_probe__"}' \
            '^(400|401)$'

          request_json_code gm-login \
            http://127.0.0.1:11922/api/auth/gm/login \
            "{\"password\":\"$(json_escape "$GM_PASSWORD")\"}" \
            '^200$'

          request_json_code client-player-login \
            http://127.0.0.1:11921/api/auth/login \
            '{"loginName":"__deploy_probe__","password":"__deploy_probe__"}' \
            '^(400|401)$'
          REMOTE_PROBE
