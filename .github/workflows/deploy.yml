name: Build And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  verify-baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Verify deploy baseline
        run: pnpm verify:deploy-baseline

  build-images:
    runs-on: ubuntu-latest
    needs: verify-baseline
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: daojie-yusheng-server
            dockerfile: packages/server/Dockerfile
          - image_name: daojie-yusheng-client
            dockerfile: packages/client/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Normalize image owner
        id: prep
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image_name }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner }}/${{ matrix.image_name }}:latest
            ghcr.io/${{ steps.prep.outputs.owner }}/${{ matrix.image_name }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-images
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Normalize image owner
        id: prep
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_SSH_PORT:-22}" "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Log in to GHCR for deploy
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Create remote Docker context
        env:
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          docker context rm production >/dev/null 2>&1 || true
          docker context create production --docker "host=ssh://${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}:${DEPLOY_SSH_PORT:-22}"

      - name: Verify replace-ready doctor
        run: pnpm verify:replace-ready:doctor

      - name: Deploy production stack
        env:
          CLIENT_IMAGE_TAG: sha-${{ github.sha }}
          SERVER_IMAGE_TAG: sha-${{ github.sha }}
          DB_USERNAME: ${{ secrets.PROD_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          DB_DATABASE: ${{ secrets.PROD_DB_DATABASE }}
          PLAYER_TOKEN_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          GM_PASSWORD: ${{ secrets.PROD_GM_PASSWORD }}
        run: |
          SERVER_PLAYER_TOKEN_SECRET="$PLAYER_TOKEN_SECRET" GM_PASSWORD="$GM_PASSWORD" docker --context production stack deploy --detach=false --with-registry-auth -c docker-stack.yml daojie-yusheng

      - name: Show production rollout state
        run: |
          set -euo pipefail
          docker --context production service ps daojie-yusheng_server --no-trunc
          docker --context production service ps daojie-yusheng_client --no-trunc

      - name: Verify deployed production routes
        env:
          GM_PASSWORD: ${{ secrets.PROD_GM_PASSWORD }}
        run: |
          set -euo pipefail
          CURL_IMAGE="curlimages/curl:8.10.1"

          docker --context production service logs --tail 120 daojie-yusheng_server || true
          docker --context production service logs --tail 80 daojie-yusheng_client || true

          docker --context production run --rm --network host "$CURL_IMAGE" -fsS http://127.0.0.1:11922/health

          docker --context production run --rm --network host "$CURL_IMAGE" -sS -o /tmp/player-login.out -w "%{http_code}" \
            -H 'Content-Type: application/json' \
            -X POST http://127.0.0.1:11922/api/auth/login \
            --data '{"loginName":"__deploy_probe__","password":"__deploy_probe__"}' \
            | grep -Eq '^(400|401)$'

          docker --context production run --rm --network host "$CURL_IMAGE" -sS -o /tmp/gm-login.out -w "%{http_code}" \
            -H 'Content-Type: application/json' \
            -X POST http://127.0.0.1:11922/api/auth/gm/login \
            --data "{\"password\":\"$GM_PASSWORD\"}" \
            | grep -Eq '^200$'

          docker --context production run --rm --network host "$CURL_IMAGE" -sS -o /tmp/client-login.out -w "%{http_code}" \
            -H 'Content-Type: application/json' \
            -X POST http://127.0.0.1:11921/api/auth/login \
            --data '{"loginName":"__deploy_probe__","password":"__deploy_probe__"}' \
            | grep -Eq '^(400|401)$'
