name: Publish Server Next Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  verify-server-next:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Verify server-next
        run: pnpm verify:server-next

  build-server-next-image:
    runs-on: ubuntu-latest
    needs: verify-server-next

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Normalize image owner
        id: prep
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server-next image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/server-next/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner }}/daojie-yusheng-server-next:latest
            ghcr.io/${{ steps.prep.outputs.owner }}/daojie-yusheng-server-next:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
