name: Sync To Gitee

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up SSH key
        env:
          GITEE_PRIVATE_KEY: ${{ secrets.GITEE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$GITEE_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts

      - name: Push main branch to Gitee
        env:
          GITEE_OWNER: ${{ vars.GITEE_OWNER }}
        run: |
          git remote add gitee "git@gitee.com:${GITEE_OWNER}/${GITHUB_REPOSITORY#*/}.git"
          git push gitee main
