name: Verify Replace-Ready Acceptance

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-replace-ready-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: server-shadow

    env:
      SHADOW_URL: http://${{ secrets.DEPLOY_SSH_HOST }}:11923
      GM_PASSWORD: ${{ secrets.PROD_GM_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Doctor
        run: SERVER_SHADOW_URL="$SHADOW_URL" GM_PASSWORD="$GM_PASSWORD" pnpm verify:replace-ready:doctor

      - name: Verify replace-ready acceptance
        run: SERVER_SHADOW_URL="$SHADOW_URL" GM_PASSWORD="$GM_PASSWORD" pnpm verify:replace-ready:acceptance
