name: Deploy Server Next Shadow

on:
  workflow_dispatch:
    inputs:
      run-destructive-proof:
        description: "是否在 shadow deploy 后跑 destructive proof"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      destructive-maintenance-ticket:
        description: "维护窗口工单或变更单编号（仅 destructive proof 时必填）"
        required: false
        default: ""
        type: string
      destructive-rollback-plan-ref:
        description: "回滚预案引用（仅 destructive proof 时必填）"
        required: false
        default: ""
        type: string
      destructive-operator:
        description: "执行 destructive proof 的负责人（仅 destructive proof 时必填）"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: server-next-deploy
  cancel-in-progress: false

jobs:
  verify-replace-ready:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mud_next_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mud_next_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/mud_next_ci?schema=public
      SERVER_NEXT_GM_PASSWORD: ci-shadow-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Verify default local/with-db replace-ready gate
        run: pnpm verify:replace-ready

  build-server-next-image:
    runs-on: ubuntu-latest
    needs: verify-replace-ready

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Normalize image owner
        id: prep
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server-next shadow image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/server-next/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner }}/daojie-yusheng-server-next:shadow-latest
            ghcr.io/${{ steps.prep.outputs.owner }}/daojie-yusheng-server-next:shadow-sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-server-next:
    runs-on: ubuntu-latest
    needs: build-server-next-image
    environment: server-next-shadow

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Normalize image owner
        id: prep
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_SSH_PORT:-22}" "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Log in to GHCR for deploy
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Create remote Docker context
        env:
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          docker context rm shadow-server-next >/dev/null 2>&1 || true
          docker context create shadow-server-next --docker "host=ssh://${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}:${DEPLOY_SSH_PORT:-22}"

      - name: Deploy server-next shadow stack
        env:
          SERVER_NEXT_IMAGE_REPOSITORY: ghcr.io/${{ steps.prep.outputs.owner }}/daojie-yusheng-server-next
          SERVER_NEXT_IMAGE_TAG: shadow-sha-${{ github.sha }}
          DB_USERNAME: ${{ secrets.PROD_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          DB_DATABASE: ${{ secrets.PROD_DB_DATABASE }}
          SERVER_NEXT_PLAYER_TOKEN_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          GM_PASSWORD: ${{ secrets.PROD_GM_PASSWORD }}
          SERVER_NEXT_RUNTIME_TOKEN: ${{ secrets.PROD_SERVER_NEXT_RUNTIME_TOKEN }}
        run: |
          docker --context shadow-server-next stack deploy --with-registry-auth -c docker-stack.server-next.yml daojie-yusheng-server-next

      - name: Doctor deployed shadow env
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SERVER_NEXT_GM_PASSWORD: ${{ secrets.PROD_GM_PASSWORD }}
          SERVER_NEXT_SHADOW_URL: http://${{ secrets.DEPLOY_SSH_HOST }}:11923
        run: pnpm verify:replace-ready:doctor

      - name: Verify deployed shadow instance
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SERVER_NEXT_GM_PASSWORD: ${{ secrets.PROD_GM_PASSWORD }}
          SERVER_NEXT_SHADOW_URL: http://${{ secrets.DEPLOY_SSH_HOST }}:11923
        run: pnpm verify:replace-ready:shadow

      - name: Validate destructive proof preconditions
        if: ${{ github.event.inputs.run-destructive-proof == 'true' }}
        env:
          DESTRUCTIVE_MAINTENANCE_TICKET: ${{ github.event.inputs.destructive-maintenance-ticket }}
          DESTRUCTIVE_ROLLBACK_PLAN_REF: ${{ github.event.inputs.destructive-rollback-plan-ref }}
          DESTRUCTIVE_OPERATOR: ${{ github.event.inputs.destructive-operator }}
        run: |
          set -euo pipefail
          missing=0
          for name in DESTRUCTIVE_MAINTENANCE_TICKET DESTRUCTIVE_ROLLBACK_PLAN_REF DESTRUCTIVE_OPERATOR; do
            if [ -z "${!name:-}" ]; then
              echo "missing required workflow_dispatch input: ${name}" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          mkdir -p .artifacts/shadow-destructive-proof

      - name: Verify shadow destructive proof
        if: ${{ github.event.inputs.run-destructive-proof == 'true' }}
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SERVER_NEXT_GM_PASSWORD: ${{ secrets.PROD_GM_PASSWORD }}
          SERVER_NEXT_SHADOW_URL: http://${{ secrets.DEPLOY_SSH_HOST }}:11923
          SERVER_NEXT_SHADOW_ALLOW_DESTRUCTIVE: '1'
        run: |
          set -euo pipefail
          pnpm verify:replace-ready:shadow:destructive 2>&1 | tee .artifacts/shadow-destructive-proof/output.log

      - name: Record destructive proof manifest
        if: ${{ always() && github.event.inputs.run-destructive-proof == 'true' }}
        env:
          DESTRUCTIVE_MAINTENANCE_TICKET: ${{ github.event.inputs.destructive-maintenance-ticket }}
          DESTRUCTIVE_ROLLBACK_PLAN_REF: ${{ github.event.inputs.destructive-rollback-plan-ref }}
          DESTRUCTIVE_OPERATOR: ${{ github.event.inputs.destructive-operator }}
        run: |
          set -euo pipefail
          cat > .artifacts/shadow-destructive-proof/manifest.json <<EOF
          {
            "workflow": "deploy-server-next",
            "runId": "${{ github.run_id }}",
            "runAttempt": "${{ github.run_attempt }}",
            "sha": "${{ github.sha }}",
            "maintenanceTicket": "${DESTRUCTIVE_MAINTENANCE_TICKET}",
            "rollbackPlanRef": "${DESTRUCTIVE_ROLLBACK_PLAN_REF}",
            "operator": "${DESTRUCTIVE_OPERATOR}",
            "shadowUrl": "http://${{ secrets.DEPLOY_SSH_HOST }}:11923",
            "destructiveProofEnabled": true
          }
          EOF

      - name: Upload destructive proof artifact
        if: ${{ always() && github.event.inputs.run-destructive-proof == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: shadow-destructive-proof-${{ github.run_id }}-${{ github.run_attempt }}
          path: .artifacts/shadow-destructive-proof
          if-no-files-found: error

      - name: Verify deployed shadow GM compat
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SERVER_NEXT_GM_PASSWORD: ${{ secrets.PROD_GM_PASSWORD }}
          SERVER_NEXT_URL: http://${{ secrets.DEPLOY_SSH_HOST }}:11923
        run: pnpm --filter @mud/server-next smoke:gm-compat
