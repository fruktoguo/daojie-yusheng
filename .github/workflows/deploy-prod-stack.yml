name: Deploy Prod Stack

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: GHCR image tag to deploy
        required: false
        default: prod
      temporary_database_conversion:
        description: Temporarily auto-convert legacy test DB player snapshots when detected
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-prod-stack
  cancel-in-progress: false

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Normalize image owner
        id: prep
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Verify release doctor
        run: pnpm verify:release:doctor

      - name: Set up SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_SSH_PORT:-22}" "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Log in to GHCR for deploy
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Create remote Docker context
        env:
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          docker context rm production >/dev/null 2>&1 || true
          docker context create production --docker "host=ssh://${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}:${DEPLOY_SSH_PORT:-22}"

      - name: Deploy production stack
        env:
          CLIENT_IMAGE_TAG: ${{ inputs.image_tag || 'prod' }}
          SERVER_IMAGE_TAG: ${{ inputs.image_tag || 'prod' }}
          DB_USERNAME: ${{ secrets.PROD_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          DB_DATABASE: ${{ secrets.PROD_DB_DATABASE }}
          PLAYER_TOKEN_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          GM_PASSWORD: ${{ secrets.PROD_GM_PASSWORD }}
        run: |
          SERVER_PLAYER_TOKEN_SECRET="$PLAYER_TOKEN_SECRET" GM_PASSWORD="$GM_PASSWORD" docker --context production stack deploy --detach=false --with-registry-auth -c docker-stack.yml daojie-yusheng

      - name: Show production rollout state
        env:
          EXPECTED_SERVER_IMAGE: ghcr.io/${{ steps.prep.outputs.owner }}/daojie-yusheng-server:${{ inputs.image_tag || 'prod' }}
          EXPECTED_CLIENT_IMAGE: ghcr.io/${{ steps.prep.outputs.owner }}/daojie-yusheng-client:${{ inputs.image_tag || 'prod' }}
        run: |
          set -euo pipefail
          assert_current_running_task() {
            service="$1"
            expected_image="$2"
            tasks="$(docker --context production service ps "$service" --no-trunc \
              --format '{{.Image}}\t{{.CurrentState}}\t{{.Error}}')"
            printf '%s\n' "$tasks"
            if ! printf '%s\n' "$tasks" | awk -F '\t' -v image="$expected_image" '
              index($1, image) == 1 && $2 ~ /^Running/ { found = 1 }
              END { exit(found ? 0 : 1) }
            '; then
              echo "$service is not running the expected image: $expected_image" >&2
              docker --context production service ps "$service" --no-trunc >&2 || true
              docker --context production service logs --since 10m --tail 80 "$service" >&2 || true
              exit 1
            fi
          }

          assert_current_running_task daojie-yusheng_server "$EXPECTED_SERVER_IMAGE"
          assert_current_running_task daojie-yusheng_client "$EXPECTED_CLIENT_IMAGE"

      - name: Temporary database preflight and conversion
        env:
          ALLOW_TEMPORARY_DATABASE_CONVERSION: ${{ inputs.temporary_database_conversion }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          set -euo pipefail
          REMOTE="${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}"
          CONVERSION_ARGS="--ensure-current-schema"
          if [ "$ALLOW_TEMPORARY_DATABASE_CONVERSION" = "true" ] || [ "$ALLOW_TEMPORARY_DATABASE_CONVERSION" = "1" ]; then
            CONVERSION_ARGS="$CONVERSION_ARGS --apply-temporary-conversion"
          fi

          timeout 90 ssh -p "${DEPLOY_SSH_PORT:-22}" -o BatchMode=yes -o ConnectTimeout=8 "$REMOTE" \
            "CONVERSION_ARGS='$CONVERSION_ARGS' sh -s" <<'REMOTE_PREFLIGHT'
          set -eu
          container_id="$(docker ps \
            --filter label=com.docker.swarm.service.name=daojie-yusheng_server \
            --format '{{.ID}}' | head -n 1)"
          if [ -z "$container_id" ]; then
            echo "cannot find daojie-yusheng_server container for database preflight" >&2
            exit 1
          fi
          docker exec "$container_id" node dist/tools/deploy-database-preflight.js $CONVERSION_ARGS
          REMOTE_PREFLIGHT

      - name: Verify deployed production routes
        env:
          GM_PASSWORD: ${{ secrets.PROD_GM_PASSWORD }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          set -euo pipefail
          quote_for_sh() {
            printf "'%s'" "$(printf '%s' "$1" | sed "s/'/'\\\\''/g")"
          }

          REMOTE="${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}"
          GM_PASSWORD_Q="$(quote_for_sh "$GM_PASSWORD")"
          PROBE_STATUS=0
          timeout 90 ssh -p "${DEPLOY_SSH_PORT:-22}" -o BatchMode=yes -o ConnectTimeout=8 "$REMOTE" \
            "GM_PASSWORD=$GM_PASSWORD_Q sh -s" <<'REMOTE_PROBE' || PROBE_STATUS=$?
          set -eu

          if ! command -v curl >/dev/null 2>&1; then
            echo "curl is required on the production host for route probes" >&2
            exit 127
          fi

          request_json_code() {
            name="$1"
            url="$2"
            data="$3"
            expected="$4"
            body="/tmp/${name}.out"
            code="$(curl --connect-timeout 3 --max-time 8 -sS -o "$body" -w "%{http_code}" \
              -H 'Content-Type: application/json' \
              -X POST "$url" \
              --data "$data" || printf 'curl_error')"
            if ! printf '%s\n' "$code" | grep -Eq "$expected"; then
              echo "route probe failed: $name url=$url status=$code expected=$expected" >&2
              sed -n '1,80p' "$body" >&2 || true
              return 1
            fi
            echo "route probe ok: $name status=$code"
          }

          wait_for_health() {
            name="$1"
            url="$2"
            body="/tmp/${name}.out"
            attempt=1
            while [ "$attempt" -le 24 ]; do
              if curl --connect-timeout 3 --max-time 8 -fsS "$url" >"$body"; then
                echo "route probe ok: $name attempt=$attempt"
                return 0
              fi
              sleep 2
              attempt=$((attempt + 1))
            done
            echo "route probe failed: $name url=$url after retries" >&2
            sed -n '1,80p' "$body" >&2 || true
            return 1
          }

          wait_for_json_code() {
            name="$1"
            url="$2"
            data="$3"
            expected="$4"
            attempt=1
            while [ "$attempt" -le 24 ]; do
              if request_json_code "$name" "$url" "$data" "$expected"; then
                echo "route probe ok: $name attempt=$attempt"
                return 0
              fi
              sleep 2
              attempt=$((attempt + 1))
            done
            return 1
          }

          json_escape() {
            printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g'
          }

          wait_for_gm_state() {
            name="$1"
            base_url="$2"
            attempt=1
            while [ "$attempt" -le 24 ]; do
              login_body="/tmp/${name}.login.out"
              state_body="/tmp/${name}.state.out"
              login_code="$(curl --connect-timeout 3 --max-time 8 -sS -o "$login_body" -w "%{http_code}" \
                -H 'Content-Type: application/json' \
                -H 'Origin: https://daojie.yuohira.com' \
                -X POST "${base_url}/api/auth/gm/login" \
                --data "{\"password\":\"$(json_escape "$GM_PASSWORD")\"}" || printf 'curl_error')"
              if [ "$login_code" = "200" ]; then
                token="$(sed -n 's/.*"accessToken"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' "$login_body" | head -n 1)"
                if [ -n "$token" ]; then
                  state_code="$(curl --connect-timeout 3 --max-time 10 -sS -o "$state_body" -w "%{http_code}" \
                    -H "Authorization: Bearer $token" \
                    -H 'Origin: https://daojie.yuohira.com' \
                    "${base_url}/api/gm/state?page=1&pageSize=50&sort=realm-desc" || printf 'curl_error')"
                  if [ "$state_code" = "200" ]; then
                    echo "route probe ok: $name attempt=$attempt"
                    return 0
                  fi
                  echo "route probe failed: $name state status=$state_code" >&2
                  sed -n '1,80p' "$state_body" >&2 || true
                else
                  echo "route probe failed: $name missing accessToken" >&2
                  sed -n '1,80p' "$login_body" >&2 || true
                fi
              else
                echo "route probe failed: $name login status=$login_code" >&2
                sed -n '1,80p' "$login_body" >&2 || true
              fi
              sleep 2
              attempt=$((attempt + 1))
            done
            return 1
          }

          wait_for_health server-health http://127.0.0.1:11922/health
          wait_for_health client-root http://127.0.0.1:11921/

          wait_for_json_code player-login \
            http://127.0.0.1:11922/api/auth/login \
            '{"loginName":"__deploy_probe__","password":"__deploy_probe__"}' \
            '^(400|401)$'

          wait_for_json_code client-player-login \
            http://127.0.0.1:11921/api/auth/login \
            '{"loginName":"__deploy_probe__","password":"__deploy_probe__"}' \
            '^(400|401)$'

          wait_for_gm_state server-gm-state http://127.0.0.1:11922
          wait_for_gm_state client-gm-state http://127.0.0.1:11921
          REMOTE_PROBE

          if [ "$PROBE_STATUS" -ne 0 ]; then
            echo "production route probe failed with status $PROBE_STATUS" >&2
            timeout 20 docker --context production service ps daojie-yusheng_server --no-trunc || true
            timeout 20 docker --context production service ps daojie-yusheng_client --no-trunc || true
            timeout 20 docker --context production service logs --since 10m --tail 80 daojie-yusheng_server || true
            timeout 20 docker --context production service logs --since 10m --tail 60 daojie-yusheng_client || true
            exit "$PROBE_STATUS"
          fi
