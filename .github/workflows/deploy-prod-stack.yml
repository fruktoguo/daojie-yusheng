name: Deploy Prod Stack

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-prod-stack
  cancel-in-progress: false

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Verify replace-ready baseline
        run: pnpm verify:replace-ready

      - name: Verify replace-ready doctor
        run: pnpm verify:replace-ready:doctor

      - name: Set up SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_SSH_PORT:-22}" "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Log in to GHCR for deploy
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Create remote Docker context
        env:
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          docker context rm production >/dev/null 2>&1 || true
          docker context create production --docker "host=ssh://${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}:${DEPLOY_SSH_PORT:-22}"

      - name: Deploy production stack
        env:
          CLIENT_IMAGE_TAG: prod
          SERVER_IMAGE_TAG: prod
          DB_USERNAME: ${{ secrets.PROD_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          DB_DATABASE: ${{ secrets.PROD_DB_DATABASE }}
          PLAYER_TOKEN_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          GM_PASSWORD: ${{ secrets.PROD_GM_PASSWORD }}
        run: |
          SERVER_PLAYER_TOKEN_SECRET="$PLAYER_TOKEN_SECRET" GM_PASSWORD="$GM_PASSWORD" docker --context production stack deploy --with-registry-auth -c docker-stack.yml daojie-yusheng

      - name: Verify backup worker
        env:
          DOCKER_CONTEXT: production
          STACK_NAME: daojie-yusheng
        run: |
          bash scripts/verify-backup-worker.sh
